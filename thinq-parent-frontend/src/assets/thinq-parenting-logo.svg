<svg width="320" height="120" viewBox="0 0 320 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="peachGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6c7b8"/>
      <stop offset="100%" stop-color="#efb3a3"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e75a5f"/>
      <stop offset="100%" stop-color="#c94448"/>
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect x="0" y="0" width="320" height="120" rx="24" fill="url(#peachGrad)"/>

  <!-- LG circle logo (simplified) -->
  <circle cx="44" cy="50" r="22" fill="none" stroke="#e75a5f" stroke-width="3"/>
  <text x="33" y="56" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#e75a5f">LG</text>

  <!-- ThinQ wordmark -->
  <text x="76" y="55" font-family="Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5" fill="#1d1d1d">ThinQ</text>
  <!-- ThinQ superscript dot accent -->
  <circle cx="148" cy="34" r="3" fill="#e75a5f"/>

  <!-- Divider -->
  <line x1="76" y1="62" x2="200" y2="62" stroke="#1d1d1d" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Parenting mode label -->
  <text x="76" y="80" font-family="Arial, sans-serif" font-size="13" font-weight="500" letter-spacing="1.5" fill="#1d1d1d" fill-opacity="0.65">PARENTING MODE</text>

  <!-- Heart icon -->
  <g transform="translate(228, 28)">
    <path d="M30 14 C30 6 22 2 16 8 C10 2 2 6 2 14 C2 20 8 26 16 32 C24 26 30 20 30 14Z"
          fill="url(#iconGrad)" opacity="0.9"/>
    <!-- Baby silhouette inside heart -->
    <circle cx="16" cy="13" r="4" fill="white" opacity="0.85"/>
    <ellipse cx="16" cy="21" rx="5.5" ry="4" fill="white" opacity="0.85"/>
  </g>
</svg>
