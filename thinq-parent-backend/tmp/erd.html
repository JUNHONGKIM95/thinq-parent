<script>
const S=document.getElementById('erd');
const ns='http://www.w3.org/2000/svg';
function $(t,a){const e=document.createElementNS(ns,t);for(const[k,v]of Object.entries(a))e.setAttribute(k,v);return e}
function txt(x,y,s,sz=11,w='normal',c='#444',anc='middle',dec=''){
  const t=$('text',{x,y:y+4,'text-anchor':anc,'font-size':sz,'font-weight':w,fill:c});
  if(dec)t.setAttribute('text-decoration',dec);
  t.textContent=s;S.appendChild(t);
}
function line(x1,y1,x2,y2,c='#aaa',w=1.2){S.appendChild($('line',{x1,y1,x2,y2,stroke:c,'stroke-width':w}))}
function ent(x,y,label,w=130,h=36){
  S.appendChild($('rect',{x:x-w/2,y:y-h/2,width:w,height:h,rx:4,fill:'#F2B6B6',stroke:'#D49A9A','stroke-width':1.8}));
  txt(x,y,label,12,'bold','#333');
}
function attr(ex,ey,dx,dy,label,pk=false){
  const cx=ex+dx,cy=ey+dy,rx=Math.max(48,label.length*6.5),ry=17;
  line(ex,ey,cx,cy);
  S.appendChild($('ellipse',{cx,cy,rx,ry,fill:'#FCE4E4',stroke:'#E0C0C0','stroke-width':1.3}));
  txt(cx,cy,label,10,'normal','#555','middle',pk?'underline':'');
}
function rel(x,y,label,w=42,h=24){
  const pts=`${x},${y-h} ${x+w},${y} ${x},${y+h} ${x-w},${y}`;
  S.appendChild($('polygon',{points:pts,fill:'#E8E8E8',stroke:'#C0C0C0','stroke-width':1.3}));
  txt(x,y,label,10,'normal','#555');
}
function card(x1,y1,x2,y2,c1,c2){
  if(c1){const px=x1+(x2-x1)*0.15,py=y1+(y2-y1)*0.15;txt(px,py-10,c1,11,'bold','#888');}
  if(c2){const px=x1+(x2-x1)*0.85,py=y1+(y2-y1)*0.85;txt(px,py-10,c2,11,'bold','#888');}
}
function domBg(x,y,w,h,label,fill){
  S.appendChild($('rect',{x,y,width:w,height:h,rx:14,fill,stroke:'#ddd','stroke-width':1,opacity:.45}));
  txt(x+12,y+16,label,11,'bold','#999','start');
}
function relLine(x1,y1,x2,y2,name,c1,c2){
  const mx=(x1+x2)/2,my=(y1+y2)/2;
  line(x1,y1,mx,my);line(mx,my,x2,y2);
  rel(mx,my,name);
  card(x1,y1,mx,my,c1,'');card(mx,my,x2,y2,'',c2);
}
function fkLine(x1,y1,x2,y2,c1,c2){
  line(x1,y1,x2,y2,'#bbb',1);
  card(x1,y1,x2,y2,c1,c2);
}
